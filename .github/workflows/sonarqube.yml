name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Navigate into your flutter folder to install dependencies
      - name: Install Dependencies
        run: |
          cd citesched_flutter
          flutter pub get

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          # Tell SonarScanner which folder to look at
          projectBaseDir: citesched_flutter
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
