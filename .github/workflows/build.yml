name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Dart
        # Uses dart-lang/setup-dart@v1.6.5
        uses: dart-lang/setup-dart@d6a63f8d349f10adbf480221a37c02b851978f6c

      - name: Build
        working-directory: citesched_server
        run: |
          dart pub get

      - name: SonarQube Scan
        # ... (rest of your SonarQube configuration)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
